<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Esports revenue predictor — end-to-end MLflow pipeline</title>
  <desc>Flowchart showing 6 stages: data profile, feature engineering, model comparison, hyperparameter tuning, final model, and model registry</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #2C2C2A; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
      .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th   { fill: #444441; }
      .c-gray .ts   { fill: #5F5E5A; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #3C3489; }
      .c-purple .ts  { fill: #534AB7; }
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th  { fill: #633806; }
      .c-amber .ts  { fill: #854F0B; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th  { fill: #27500A; }
      .c-green .ts  { fill: #3B6D11; }
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #0C447C; }
      .c-blue .ts   { fill: #185FA5; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th  { fill: #712B13; }
      .c-coral .ts  { fill: #993C1D; }
    </style>
  </defs>

  <!-- Stage 1: Data profile -->
  <g class="c-gray">
    <rect x="240" y="30" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Data profile</text>
    <text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central">400 rows · 21 cols · target set</text>
  </g>

  <line x1="340" y1="86" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 2: Feature engineering -->
  <g class="c-purple">
    <rect x="210" y="116" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">Feature engineering</text>
    <text class="ts" x="340" y="156" text-anchor="middle" dominant-baseline="central">Label encode · drop leaky col</text>
  </g>

  <!-- lines from feature eng to each model -->
  <path d="M340 172 L340 188 L180 188 L180 202" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="172" x2="340" y2="202" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 172 L340 188 L500 188 L500 202" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 3: Model comparison — 3 boxes -->
  <g class="c-teal">
    <rect x="110" y="202" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="224" text-anchor="middle" dominant-baseline="central">Linear reg.</text>
    <text class="ts" x="180" y="242" text-anchor="middle" dominant-baseline="central">R² 0.344</text>
  </g>
  <g class="c-teal">
    <rect x="270" y="202" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">Random forest</text>
    <text class="ts" x="340" y="242" text-anchor="middle" dominant-baseline="central">R² 0.458</text>
  </g>
  <g class="c-teal">
    <rect x="430" y="202" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="224" text-anchor="middle" dominant-baseline="central">XGBoost</text>
    <text class="ts" x="500" y="242" text-anchor="middle" dominant-baseline="central">R² 0.530  ✓ best</text>
  </g>

  <!-- converging lines from models to tuning -->
  <path d="M180 258 L180 300 L340 300 L340 318" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 258 L340 318" class="arr" marker-end="url(#arrow)"/>
  <path d="M500 258 L500 300 L340 300 L340 318" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 4: Hyperparameter tuning -->
  <g class="c-amber">
    <rect x="200" y="318" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="340" text-anchor="middle" dominant-baseline="central">Hyperparameter tuning</text>
    <text class="ts" x="340" y="358" text-anchor="middle" dominant-baseline="central">270 fits · lr=0.1 · depth=3</text>
  </g>

  <line x1="340" y1="374" x2="340" y2="404" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 5: Final model -->
  <g class="c-green">
    <rect x="200" y="404" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="426" text-anchor="middle" dominant-baseline="central">Final model</text>
    <text class="ts" x="340" y="444" text-anchor="middle" dominant-baseline="central">16 features · R² 0.616 · RMSE 3561</text>
  </g>

  <line x1="340" y1="460" x2="340" y2="490" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 6: Registry -->
  <g class="c-blue">
    <rect x="190" y="490" width="300" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="512" text-anchor="middle" dominant-baseline="central">Model registry</text>
    <text class="ts" x="340" y="530" text-anchor="middle" dominant-baseline="central">esports-revenue-predictor v1 · production</text>
  </g>

  <!-- Side label: leakage caught -->
  <g class="c-coral">
    <rect x="530" y="116" width="120" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="590" y="133" text-anchor="middle" dominant-baseline="central">Leakage caught</text>
    <text class="ts" x="590" y="151" text-anchor="middle" dominant-baseline="central">dropped Gaming_Rev</text>
  </g>
  <line x1="530" y1="138" x2="470" y2="144" class="leader"/>

  <!-- Side label: v2 experimental -->
  <g class="c-gray">
    <rect x="530" y="404" width="110" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="585" y="421" text-anchor="middle" dominant-baseline="central">v2 experimental</text>
    <text class="ts" x="585" y="439" text-anchor="middle" dominant-baseline="central">log-transform</text>
  </g>
  <line x1="530" y1="426" x2="480" y2="430" class="leader"/>

</svg>
